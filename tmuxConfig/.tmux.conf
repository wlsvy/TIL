# =============================================================================
# TMUX 입문자용 설정
# =============================================================================

# Prefix 키 변경 (Ctrl+b → Ctrl+a, nvim과 겹치지 않음)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# =============================================================================
# 기본 설정
# =============================================================================

# 마우스 지원 활성화
set -g mouse on

# 윈도우 번호를 1부터 시작 (0보다 직관적)
set -g base-index 1
setw -g pane-base-index 1

# 윈도우 번호 자동 재정렬
set -g renumber-windows on

# ESC 키 지연 제거 (vim 사용자에게 중요)
set -sg escape-time 0

# 히스토리 크기 증가
set -g history-limit 10000

# =============================================================================
# 직관적인 단축키 설정
# =============================================================================

# 설정 파일 리로드: Prefix + r
bind r source-file ~/.config/.tmux.conf \; display "Config reloaded!"

# 패널 분할 (직관적인 키)
bind | split-window -h -c "#{pane_current_path}"  # 세로 분할
bind - split-window -v -c "#{pane_current_path}"  # 가로 분할

# 패널 이동 (화살표 키)
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# 패널 크기 조절 (Shift + 화살표)
bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 5

# 윈도우 이동
bind -r C-h previous-window  # Prefix + Ctrl+h
bind -r C-l next-window      # Prefix + Ctrl+l

# 새 윈도우 생성 (현재 경로에서)
bind c new-window -c "#{pane_current_path}"

# =============================================================================
# 시각적 개선
# =============================================================================

# 256 컬러 지원
set -g default-terminal "screen-256color"

# 상태바 설정
set -g status-bg colour235
set -g status-fg colour255
set -g status-left-length 20
set -g status-left '#[fg=colour76][#S] '
set -g status-right '#[fg=colour166]%Y-%m-%d %H:%M'

# 활성 윈도우 하이라이트
setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'

# 패널 테두리 색상
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour81'

# =============================================================================
# 복사 모드 설정 (vi 키바인딩)
# =============================================================================

# vi 모드 활성화
setw -g mode-keys vi

# 복사 모드 진입: Prefix + v
bind v copy-mode

# 복사 모드에서 vi 키바인딩
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
